<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080C12">
<title>XAU30 Dynamics — Auto Social</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #103050;
  --navy2: #1F4E79;
  --gold: #D0A030;
  --gold-light: #D4B842;
  --gold-dim: rgba(208,160,48,0.15);
  --gold-border: rgba(208,160,48,0.25);
  --bg: #080C12;
  --bg2: #0D1520;
  --bg3: #121C28;
  --bg4: #172030;
  --text: #EEE8DC;
  --muted: #7A8898;
  --muted2: #4A5868;
  --green: #2ECC71;
  --green-dim: rgba(46,204,113,0.12);
  --red: #E74C3C;
  --red-dim: rgba(231,76,60,0.12);
  --font-display: "Playfair Display", serif;
  --font-mono: "DM Mono", monospace;
  --font-body: "DM Sans", sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}

html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; padding-bottom: 60px; }

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,12,18,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--gold-border);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}

.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo img { width: 38px; height: 38px; border-radius: 6px; object-fit: cover; }
.header-logo-text { display: flex; flex-direction: column; line-height: 1.15; }
.header-logo-main { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.header-logo-main span { color: var(--gold); }
.header-logo-sub { font-family: var(--font-mono); font-size: 0.52rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }

.header-right { display: flex; align-items: center; gap: 10px; }

.pending-badge {
  background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold);
  font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.08em;
  padding: 4px 10px; border-radius: 20px;
}

.refresh-btn {
  background: transparent; border: 1px solid var(--muted2); color: var(--muted);
  font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 7px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }

.filter-bar {
  padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid rgba(255,255,255,0.04); background: var(--bg2);
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-pill {
  flex-shrink: 0; font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 6px 13px; border-radius: 20px;
  border: 1px solid var(--muted2); color: var(--muted); background: transparent;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-pill.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

.posts-container { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }

.post-card {
  background: var(--bg2); border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s;
  animation: cardIn 0.3s ease both;
}
@keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.post-card.approved { border-color: rgba(46,204,113,0.3); }
.post-card.rejected { border-color: rgba(231,76,60,0.2); opacity: 0.45; }

.card-header {
  padding: 13px 14px; display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
}
.card-header:active { background: rgba(255,255,255,0.02); }

.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--muted2); }
.status-dot.pending { background: var(--gold); animation: pulse 2s infinite; }
.status-dot.approved { background: var(--green); }
.status-dot.rejected { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.pillar-tag {
  font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px; background: var(--gold-dim); border: 1px solid var(--gold-border);
  color: var(--gold); flex-shrink: 0;
}
.card-headline { font-family: var(--font-display); font-size: 0.88rem; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }
.card-date { font-family: var(--font-mono); font-size: 0.55rem; color: var(--muted2); flex-shrink: 0; }
.card-chevron { color: var(--muted2); font-size: 0.7rem; flex-shrink: 0; transition: transform 0.2s; }
.card-body.open + * .card-chevron { transform: rotate(180deg); }

.card-body { display: none; flex-direction: column; gap: 14px; padding: 0 14px 16px; border-top: 1px solid rgba(255,255,255,0.04); }
.card-body.open { display: flex; }

.image-preview { width: 100%; aspect-ratio: 4/5; border-radius: var(--radius-sm); overflow: hidden; background: var(--bg3); margin-top: 14px; }
.image-preview img { width: 100%; height: 100%; object-fit: cover; }
.image-preview-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--muted2); font-family: var(--font-mono); font-size: 0.6rem; }

.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-header { display: flex; align-items: center; justify-content: space-between; }
.field-label { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

.field-input {
  background: var(--bg3); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius-sm);
  color: var(--text); font-family: var(--font-body); font-size: 0.875rem; line-height: 1.6;
  padding: 9px 11px; width: 100%; resize: vertical; transition: border-color 0.2s; -webkit-appearance: none;
}
.field-input:focus { outline: none; border-color: var(--gold-border); background: var(--bg4); }
.field-input.mono { font-family: var(--font-mono); font-size: 0.72rem; }

.char-count { font-family: var(--font-mono); font-size: 0.55rem; color: var(--muted2); text-align: right; }
.char-count.over { color: var(--red); }

.copy-btn {
  font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 9px; border-radius: 5px; border: 1px solid var(--gold-border);
  background: var(--gold-dim); color: var(--gold); cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.copy-btn:active { transform: scale(0.94); }
.copy-btn.copied { background: var(--green-dim); border-color: rgba(46,204,113,0.3); color: var(--green); }

.platform-block { background: var(--bg3); border: 1px solid rgba(255,255,255,0.05); border-radius: var(--radius-sm); padding: 11px; }
.platform-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.platform-label { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }

.graphic-block {
  background: linear-gradient(135deg, rgba(208,160,48,0.08), rgba(16,48,80,0.25));
  border: 1px solid var(--gold-border); border-radius: var(--radius-sm); padding: 11px;
}

.divider { height: 1px; background: rgba(255,255,255,0.05); }

.canva-section { display: flex; flex-direction: column; gap: 10px; }
.variant-selector { display: flex; gap: 8px; }

.variant-btn {
  flex: 1; padding: 10px 8px; border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.1); background: var(--bg3); color: var(--muted);
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.variant-btn.selected-black { background: #0A0A0A; border-color: var(--gold); color: var(--gold); }
.variant-btn.selected-white { background: #F0EDE6; border-color: var(--gold); color: #103050; font-weight: 600; }

.canva-open-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 13px;
  background: var(--navy); border: 1px solid var(--navy2); color: var(--text);
  font-family: var(--font-mono); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  border-radius: var(--radius-sm); cursor: pointer; text-decoration: none; transition: all 0.2s;
}
.canva-open-btn:hover { background: var(--navy2); border-color: var(--gold-border); }
.canva-open-btn:active { transform: scale(0.98); }
.canva-open-btn.disabled { opacity: 0.35; pointer-events: none; cursor: default; }

.canva-hint { font-family: var(--font-mono); font-size: 0.56rem; color: var(--muted2); text-align: center; letter-spacing: 0.06em; line-height: 1.5; }

.posted-row { display: flex; gap: 8px; }
.posted-toggle {
  flex: 1; padding: 10px 6px; border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.08); background: var(--bg3); color: var(--muted);
  font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.posted-toggle.done { background: var(--green-dim); border-color: rgba(46,204,113,0.3); color: var(--green); }

.action-row { display: flex; gap: 8px; }
.btn-approve { flex:1; padding:13px; background:var(--green-dim); border:1px solid rgba(46,204,113,0.3); color:var(--green); font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.08em; text-transform:uppercase; border-radius:var(--radius-sm); cursor:pointer; transition:all 0.2s; }
.btn-reject { flex:1; padding:13px; background:var(--red-dim); border:1px solid rgba(231,76,60,0.2); color:var(--red); font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.08em; text-transform:uppercase; border-radius:var(--radius-sm); cursor:pointer; transition:all 0.2s; }
.btn-save { padding:13px 16px; background:var(--gold-dim); border:1px solid var(--gold-border); color:var(--gold); font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.08em; text-transform:uppercase; border-radius:var(--radius-sm); cursor:pointer; transition:all 0.2s; }
.btn-approve:active,.btn-reject:active,.btn-save:active { transform:scale(0.97); }

.loading { display:flex; align-items:center; justify-content:center; padding:60px 20px; flex-direction:column; gap:16px; }
.spinner { width:28px; height:28px; border:2px solid var(--gold-border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-family:var(--font-mono); font-size:0.62rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }

.empty-state { text-align:center; padding:60px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; }
.empty-icon { font-size:2rem; opacity:0.4; }
.empty-text { font-family:var(--font-mono); font-size:0.68rem; color:var(--muted); letter-spacing:0.08em; }
.empty-sub { font-size:0.8rem; color:var(--muted2); }

.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--bg3); border:1px solid var(--gold-border); color:var(--text);
  font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.06em;
  padding:10px 18px; border-radius:20px; transition:transform 0.25s ease;
  z-index:999; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { transform:translateX(-50%) translateY(0); }

</style>
</head>

    <div class="header-logo-text">
      <div class="header-logo-main">XAU30<span> Dynamics</span></div>
      <div class="header-logo-sub">Auto Social</div>
    </div>
  </div>
  <div class="header-right">
    <span class="pending-badge" id="pendingBadge" style="display:none"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadPosts()">↺ Refresh</button>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-pill active" onclick="setFilter('Pending Review',this)">Pending</button>
  <button class="filter-pill" onclick="setFilter('Approved',this)">Approved</button>
  <button class="filter-pill" onclick="setFilter('Rejected',this)">Rejected</button>
  <button class="filter-pill" onclick="setFilter('all',this)">All</button>
</div>

<div id="postsContainer" class="posts-container"></div>
<div class="toast" id="toast"></div>

<script>
const CANVA_BLACK = 'https://www.canva.com/brand/brand-templates/EAHIhYHj5tQ';
const CANVA_WHITE = 'https://www.canva.com/brand/brand-templates/EAHIhW1SMO4';
let allPosts = [], currentFilter = 'Pending Review';

async function loadPosts() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('postsContainer').innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Loading posts</div></div>';
  try {
    const res = await fetch('/api/posts');
    allPosts = await res.json();
    renderPosts();
  } catch(e) {
    document.getElementById('postsContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠</div><div class="empty-text">Failed to load</div><div class="empty-sub">Check connection and refresh</div></div>';
  } finally { btn.classList.remove('spinning'); }
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderPosts();
}

function renderPosts() {
  const filtered = currentFilter === 'all' ? allPosts : allPosts.filter(p => p.status === currentFilter);
  const pending = allPosts.filter(p => p.status === 'Pending Review').length;
  const badge = document.getElementById('pendingBadge');
  badge.textContent = pending > 0 ? pending + ' pending' : '';
  badge.style.display = pending > 0 ? '' : 'none';
  if (filtered.length === 0) {
    const ip = currentFilter === 'Pending Review';
    document.getElementById('postsContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">' + (ip ? '✓' : '○') + '</div><div class="empty-text">' + (ip ? 'All clear' : 'Nothing here') + '</div><div class="empty-sub">' + (ip ? 'No posts pending review' : 'No posts match this filter') + '</div></div>';
    return;
  }
  document.getElementById('postsContainer').innerHTML = filtered.map((p,i) => renderCard(p,i)).join('');
}

function renderCard(post, idx) {
  const sc = post.status==='Approved'?'approved':post.status==='Rejected'?'rejected':'';
  const dc = post.status==='Approved'?'approved':post.status==='Rejected'?'rejected':'pending';
  const r = post.rowIndex;
  const vs = post.bg_variant==='1'||post.bg_variant==='2';
  const cu = post.bg_variant==='2'?CANVA_WHITE:CANVA_BLACK;
  const gt = post.graphic_text || '';
  const gtDim = gt ? '' : ' style="opacity:0.4"';
  const gtVal = esc(gt || '— not available on this post (predates this field)');
  return `<div class="post-card ${sc}" id="card-${r}" style="animation-delay:${idx*40}ms">
  <div class="card-header" onclick="toggleCard(${r})">
    <div class="status-dot ${dc}"></div>
    <div class="pillar-tag">${pillarShort(post.pillar)}</div>
    <div class="card-headline">${esc(post.headline||'—')}</div>
    <div class="card-date">${post.date||''}</div>
    <div class="card-chevron">▾</div>
  </div>
  <div class="card-body" id="body-${r}">
    ${post.image_url?`<div class="image-preview"><img src="${post.image_url}" alt="Post image" onerror="this.parentElement.innerHTML='<div class=image-preview-placeholder>Image expired</div>'"></div>`:''}
    <div class="field-group">
      <div class="field-header"><div class="field-label">Headline</div><button class="copy-btn" onclick="copyEl('f-headline-${r}',this)">Copy</button></div>
      <input class="field-input" id="f-headline-${r}" value="${escAttr(post.headline)}">
    </div>
    <div class="field-group">
      <div class="field-header"><div class="field-label">Subheading</div><button class="copy-btn" onclick="copyEl('f-subheading-${r}',this)">Copy</button></div>
      <input class="field-input" id="f-subheading-${r}" value="${escAttr(post.subheading)}">
    </div>
    <div class="field-group">
      <div class="field-header"><div class="field-label">CTA Text</div><button class="copy-btn" onclick="copyEl('f-cta_text-${r}',this)">Copy</button></div>
      <input class="field-input" id="f-cta_text-${r}" value="${escAttr(post.cta_text)}">
    </div>
    <div class="graphic-block">
      <div class="field-header" style="margin-bottom:8px">
        <div class="platform-label">Graphic Text</div>
        <button class="copy-btn" onclick="copyEl('f-graphic_text-${r}',this)">Copy</button>
      </div>
      <textarea class="field-input" id="f-graphic_text-${r}" rows="4"${gtDim}>${gtVal}</textarea>
    </div>
    <div class="divider"></div>
    <div class="platform-block">
      <div class="platform-header"><div class="platform-label">Instagram</div><button class="copy-btn" onclick="copyIG(${r},this)">Copy IG</button></div>
      <textarea class="field-input" id="f-caption-${r}" rows="5" oninput="updateCC(${r},'caption',2200)">${esc(post.caption)}</textarea>
      <div class="char-count" id="cc-caption-${r}">${post.caption.length} / 2200</div>

    </div>
    <div class="platform-block">
      <div class="platform-header"><div class="platform-label">X / Twitter</div><button class="copy-btn" onclick="copyEl('f-x_post-${r}',this)">Copy</button></div>
      <textarea class="field-input mono" id="f-x_post-${r}" rows="3" oninput="updateCC(${r},'x_post',280)">${esc(post.x_post)}</textarea>
      <div class="char-count ${post.x_post.length>280?'over':''}" id="cc-x_post-${r}">${post.x_post.length} / 280</div>
    </div>
    <div class="platform-block">
      <div class="platform-header"><div class="platform-label">Threads</div><button class="copy-btn" onclick="copyEl('f-threads_post-${r}',this)">Copy</button></div>
      <textarea class="field-input" id="f-threads_post-${r}" rows="3" oninput="updateCC(${r},'threads_post',500)">${esc(post.threads_post)}</textarea>
      <div class="char-count ${post.threads_post.length>500?'over':''}" id="cc-threads_post-${r}">${post.threads_post.length} / 500</div>
    </div>
    <div class="divider"></div>
    <div class="canva-section">
      <div class="field-label">Canva Template</div>
      <div class="variant-selector">
        <button class="variant-btn ${post.bg_variant==='1'?'selected-black':''}" id="var1-${r}" onclick="selectVariant(${r},'1')">◼ Black</button>
        <button class="variant-btn ${post.bg_variant==='2'?'selected-white':''}" id="var2-${r}" onclick="selectVariant(${r},'2')">◻ White</button>
      </div>
      <a class="canva-open-btn ${vs?'':' disabled'}" id="canva-btn-${r}" href="${cu}" target="_blank">Open Template in Canva →</a>
      <div class="canva-hint">Select variant · Paste Headline, Subheading, CTA + Graphic Text into template · Swap chart image</div>
    </div>
    <div class="divider"></div>
    <div class="field-group">
      <div class="field-label">Posted</div>
      <div class="posted-row">
        <button class="posted-toggle ${post.posted_ig?'done':''}" id="pig-${r}" onclick="togglePosted(${r},'posted_ig','pig-${r}')">
          ${post.posted_ig?'✓ IG':'IG'}</button>
        <button class="posted-toggle ${post.posted_x?'done':''}" id="px-${r}" onclick="togglePosted(${r},'posted_x','px-${r}')">
          ${post.posted_x?'✓ X':'X'}</button>
        <button class="posted-toggle ${post.posted_threads?'done':''}" id="pth-${r}" onclick="togglePosted(${r},'posted_threads','pth-${r}')">
          ${post.posted_threads?'✓ Threads':'Threads'}</button>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-approve" onclick="setStatus(${r},'Approved')">✓ Approve</button>
      <button class="btn-reject" onclick="setStatus(${r},'Rejected')">✕ Reject</button>
      <button class="btn-save" onclick="saveEdits(${r})">Save</button>
    </div>
  </div>
</div>`;
}

function toggleCard(r) { document.getElementById('body-'+r)?.classList.toggle('open'); }

function updateCC(r,f,max) {
  const el=document.getElementById('f-'+f+'-'+r);
  const cc=document.getElementById('cc-'+f+'-'+r);
  if(!el||!cc)return;
  const len=el.value.length;
  cc.textContent=len+' / '+max;
  cc.classList.toggle('over',len>max);
}

function copyEl(id,btn) {
  const el=document.getElementById(id);
  if(!el)return;
  doC(el.value!==undefined?el.value:el.textContent);
  flashBtn(btn);
  showToast('Copied');
}

function copyIG(r,btn) {
  const cap=document.getElementById('f-caption-'+r)?.value||'';
  const hash=document.getElementById('f-hashtags-'+r)?.value||'';
  doC(hash?cap+'\n\n'+hash:cap);
  flashBtn(btn);
  showToast('Instagram caption + hashtags copied');
}

function doC(text) {
  if(navigator.clipboard){navigator.clipboard.writeText(text).catch(()=>fallback(text));}else{fallback(text);}
}

function fallback(text) {
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
}

function flashBtn(btn) {
  if(!btn)return;
  const orig=btn.textContent;
  btn.classList.add('copied'); btn.textContent='✓';
  setTimeout(()=>{btn.classList.remove('copied');btn.textContent=orig;},1500);
}

function selectVariant(r,v) {
  document.getElementById('var1-'+r)?.classList.remove('selected-black');
  document.getElementById('var2-'+r)?.classList.remove('selected-white');
  if(v==='1')document.getElementById('var1-'+r)?.classList.add('selected-black');
  if(v==='2')document.getElementById('var2-'+r)?.classList.add('selected-white');
  const post=allPosts.find(p=>p.rowIndex===r);
  if(post)post.bg_variant=v;
  const btn=document.getElementById('canva-btn-'+r);
  if(btn){btn.classList.remove('disabled');btn.href=v==='2'?CANVA_WHITE:CANVA_BLACK;}
  patch(r,{bg_variant:v});
}

async function saveEdits(r) {
  const fields=['headline','subheading','cta_text','graphic_text','caption','x_post','threads_post'];
  const u={};
  fields.forEach(f=>{const el=document.getElementById('f-'+f+'-'+r);if(el)u[f]=el.value;});
  await patch(r,u);
  showToast('Saved ✓');
}

async function setStatus(r,status) {
  await patch(r,{status});
  const post=allPosts.find(p=>p.rowIndex===r);
  if(post)post.status=status;
  const card=document.getElementById('card-'+r);
  if(card){
    card.className='post-card '+(status==='Approved'?'approved':status==='Rejected'?'rejected':'');
    if(currentFilter!=='all'&&currentFilter!==status){
      card.style.transition='opacity 0.4s,transform 0.4s';
      card.style.opacity='0'; card.style.transform='translateX(20px)';
      setTimeout(()=>renderPosts(),400);
    }
  }
  showToast('Marked as '+status);
}

async function togglePosted(r,field,btnId) {
  const btn=document.getElementById(btnId);
  const post=allPosts.find(p=>p.rowIndex===r);
  if(!post)return;
  const newVal=post[field]?'':new Date().toISOString();
  post[field]=newVal;
  const labels={posted_ig:'IG',posted_x:'X',posted_threads:'Threads'};
  const label=labels[field];
  if(btn){btn.classList.toggle('done',!!newVal);btn.textContent=newVal?'✓ '+label:label;}
  await patch(r,{[field]:newVal});
  showToast(newVal?label+' posted ✓':label+' unmarked');
}

async function patch(r,updates) {
  try {
    await fetch('/api/posts/'+r,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
  } catch {showToast('Save failed');}
}

let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

function pillarShort(p) {
  const m={'Performance Proof':'Proof','Strategy Deep Dive':'Strat','Product Showcase':'Product','Educational':'Edu','Market Commentary':'Commentary','Behind the Scenes':'BTS'};
  return m[p]||p||'—';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

loadPosts();
</script>
